# App
spring.application.name=rag-backend
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ragdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:raguser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ragpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Gemini
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.ragplatform=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE